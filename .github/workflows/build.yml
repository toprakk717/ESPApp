name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_HOME: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Accept all SDK licenses hardcoded
        run: |
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
          echo "504667f4c0de7af1a06de9f4b1727b84351f2910" >> $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > $ANDROID_SDK_ROOT/licenses/intel-android-extra-license
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > $ANDROID_SDK_ROOT/licenses/google-gdk-license
          yes | sdkmanager --licenses || true

      - name: Install all SDK components
        run: |
          yes | sdkmanager \
            "build-tools;35.0.0" \
            "build-tools;34.0.0" \
            "build-tools;33.0.2" \
            "build-tools;33.0.0" \
            "build-tools;32.0.0" \
            "platforms;android-35" \
            "platforms;android-34" \
            "platforms;android-33" \
            "platforms;android-32" \
            "platform-tools" \
            "tools" \
            "ndk;25.2.9519653" \
            "cmake;3.22.1" \
            "extras;android;m2repository" \
            "extras;google;m2repository" \
            "extras;google;google_play_services" || true

      - name: Install all system deps
        run: |
          sudo add-apt-repository universe -y
          sudo apt-get update
          sudo apt-get install -y \
            zlib1g-dev \
            libffi-dev \
            libssl-dev \
            openjdk-17-jdk \
            aidl \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libltdl-dev \
            libgdbm-dev \
            libc6-dev \
            libncurses5-dev \
            libbz2-dev \
            libreadline-dev \
            libsqlite3-dev \
            libexpat1-dev \
            liblzma-dev \
            python3-dev \
            python3-pip \
            unzip \
            zip \
            git \
            wget \
            curl \
            cmake \
            ninja-build \
            build-essential \
            ccache \
            lib32z1 \
            libc6-i386 \
            lib32stdc++6 \
            ant

      - name: Install Python deps
        run: |
          pip install --upgrade pip setuptools wheel
          pip install --upgrade buildozer
          pip install cython==0.29.33
          pip install kivy
          pip install numpy
          pip install opencv-python-headless

      - name: Link entire SDK to buildozer
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk
          for version in 35.0.0 34.0.0 33.0.2 33.0.0 32.0.0; do
            mkdir -p ~/.buildozer/android/platform/android-sdk/build-tools/$version
            ln -sf $ANDROID_SDK_ROOT/build-tools/$version/* \
              ~/.buildozer/android/platform/android-sdk/build-tools/$version/ || true
          done
          mkdir -p ~/.buildozer/android/platform/android-sdk/platforms
          for api in 35 34 33 32; do
            ln -sf $ANDROID_SDK_ROOT/platforms/android-$api \
              ~/.buildozer/android/platform/android-sdk/platforms/ || true
          done
          mkdir -p ~/.buildozer/android/platform/android-sdk/platform-tools
          ln -sf $ANDROID_SDK_ROOT/platform-tools/* \
            ~/.buildozer/android/platform/android-sdk/platform-tools/ || true
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/* \
            ~/.buildozer/android/platform/android-sdk/tools/bin/ || true
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager || true
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin
          ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/* \
            ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/ || true
          mkdir -p ~/.buildozer/android/platform
          ln -sf $ANDROID_SDK_ROOT/ndk/25.2.9519653 \
            ~/.buildozer/android/platform/android-ndk-r25b || true
          mkdir -p ~/.buildozer/android/platform/android-sdk/extras
          ln -sf $ANDROID_SDK_ROOT/extras/* \
            ~/.buildozer/android/platform/android-sdk/extras/ || true
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          cp -r $ANDROID_SDK_ROOT/licenses/* \
            ~/.buildozer/android/platform/android-sdk/licenses/ || true

      - name: Verify SDK setup
        run: |
          echo "=== SDK Root ==="
          ls $ANDROID_SDK_ROOT
          echo "=== Build Tools ==="
          ls ~/.buildozer/android/platform/android-sdk/build-tools/
          echo "=== Platforms ==="
          ls ~/.buildozer/android/platform/android-sdk/platforms/
          echo "=== Licenses ==="
          ls ~/.buildozer/android/platform/android-sdk/licenses/
          echo "=== Java ==="
          java -version
          echo "=== SDKManager ==="
          ls ~/.buildozer/android/platform/android-sdk/tools/bin/

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
        run: buildozer android debug 2>&1

      - uses: actions/upload-artifact@v4
        with:
          name: esp-apk
          path: bin/*.apk
          if-no-files-found: warn
